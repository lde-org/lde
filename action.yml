name: "Setup lde"
description: "Install lde package manager"

inputs:
  version:
    description: "Version to install (e.g., '0.8.1', 'latest', or 'nightly')"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install lde (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        case "${{ inputs.version }}" in
          nightly) ARGS="--nightly" ;;
          latest)  ARGS="" ;;
          *)       ARGS="--version ${{ inputs.version }}" ;;
        esac
        sh "${{ github.action_path }}/install.sh" $ARGS
        echo "$HOME/.lde" >> "$GITHUB_PATH"

    - name: Install lde (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $version = "${{ inputs.version }}"

        if ($version -eq "nightly") {
            & "${{ github.action_path }}/install.ps1" "--nightly"
        } elseif ($version -eq "latest") {
            & "${{ github.action_path }}/install.ps1"
        } else {
            & "${{ github.action_path }}/install.ps1" "--version" $version
        }

        echo "$env:USERPROFILE\.lde" >> $env:GITHUB_PATH
