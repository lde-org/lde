name: "Setup lpm"
description: "Install lpm package manager"

inputs:
  version:
    description: "Version to install (e.g., '0.7.1', 'latest', or 'nightly')"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install lpm (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        case "${{ inputs.version }}" in
          nightly) ARGS="--nightly" ;;
          latest)  ARGS="" ;;
          *)       ARGS="--version ${{ inputs.version }}" ;;
        esac
        sh "${{ github.action_path }}/install.sh" $ARGS
        echo "$HOME/.lpm" >> "$GITHUB_PATH"

    - name: Install lpm (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $version = "${{ inputs.version }}"
        $scriptArgs = if ($version -eq "nightly") { @("--nightly") }
                      elseif ($version -eq "latest") { @() }
                      else { @("--version", $version) }
        & "${{ github.action_path }}/install.ps1" @scriptArgs
        echo "$env:USERPROFILE\.lpm" >> $env:GITHUB_PATH
