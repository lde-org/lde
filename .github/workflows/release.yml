name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            outfile: lpm-linux-x86-64
            sea_cc: gcc
          - os: ubuntu-22.04-arm
            outfile: lpm-linux-aarch64
            sea_cc: gcc
          - os: windows-latest
            outfile: lpm-windows-x86-64.exe
            sea_cc: gcc
          - os: windows-11-arm
            outfile: lpm-windows-aarch64.exe
            sea_cc: clang
          # - os: macos-15-intel
          #   outfile: lpm-macos-x86-64
          #   sea_cc: gcc
          - os: macos-15
            outfile: lpm-macos-aarch64
            sea_cc: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache llvm-mingw (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        id: cache-llvm-mingw
        uses: actions/cache@v5
        with:
          path: llvm-mingw-20260311-ucrt-aarch64
          key: llvm-mingw-20260311-ucrt-aarch64

      - name: Install llvm-mingw (Windows ARM64)
        if: matrix.os == 'windows-11-arm' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-aarch64.zip
          Expand-Archive -Path llvm-mingw.zip -DestinationPath .

      - name: Add llvm-mingw to PATH (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: echo "$env:GITHUB_WORKSPACE\llvm-mingw-20260311-ucrt-aarch64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup lpm
        uses: codebycruz/lpm@master
        with:
          version: nightly

      - name: Build lpm
        env:
          SEA_CC: ${{ matrix.sea_cc }}
        run: |
          cd packages/lpm
          lpm compile --outfile ${{ matrix.outfile }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: packages/lpm/${{ matrix.outfile }}
