name: Nightly

on:
  push:
    branches:
      - master
    paths:
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            outfile: lpm-linux-x86-64
          - os: ubuntu-22.04-arm
            outfile: lpm-linux-aarch64
          - os: windows-latest
            outfile: lpm-windows-x86-64
          # - os: macos-15-intel
          #   outfile: lpm-macos-x86-64
          - os: macos-15
            outfile: lpm-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup lpm
        uses: codebycruz/lpm@master

      - name: Build lpm (Unix)
        if: runner.os != 'Windows'
        run: |
          cd packages/lpm
          lpm compile --outfile ${{ matrix.outfile }}

      - name: Build lpm (Windows)
        if: runner.os == 'Windows'
        run: |
          cd packages/lpm
          lpm compile --outfile ${{ matrix.outfile }}.exe

      - name: Upload nightly release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            Automated nightly build from master.
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: packages/lpm/${{ matrix.outfile }}${{ runner.os == 'Windows' && '.exe' || '' }}
          fail_on_unmatched_files: true
