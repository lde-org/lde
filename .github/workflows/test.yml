name: Test

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            outfile: lde-dev
            sea_cc: gcc
          - os: ubuntu-22.04-arm
            outfile: lde-dev
            sea_cc: gcc
          - os: windows-latest
            outfile: lde-dev.exe
            sea_cc: gcc
          - os: windows-11-arm
            outfile: lde-dev.exe
            sea_cc: aarch64-w64-mingw32-clang
          - os: macos-15-intel
            outfile: lde-dev
            sea_cc: gcc
          - os: macos-15
            outfile: lde-dev
            sea_cc: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache llvm-mingw (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        id: cache-llvm-mingw
        uses: actions/cache@v5
        with:
          path: llvm-mingw-20260311-ucrt-aarch64
          key: llvm-mingw-20260311-ucrt-aarch64

      - name: Install llvm-mingw (Windows ARM64)
        if: matrix.os == 'windows-11-arm' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-aarch64.zip
          Expand-Archive -Path llvm-mingw.zip -DestinationPath .

      - name: Add llvm-mingw to PATH (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: echo "$env:GITHUB_WORKSPACE\llvm-mingw-20260311-ucrt-aarch64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup lde
        uses: lde-org/setup-lde@master
        with:
          version: nightly

      - name: Build lde
        # lde's own tests invoke the lde binary directly (e.g. to test CLI flags),
        # so we must compile a fresh binary from source before running tests.
        # Using the pre-installed nightly binary would miss any CLI changes in this PR.
        env:
          SEA_CC: ${{ matrix.sea_cc }}
        run: |
          cd packages/lde
          lde compile --outfile ${{ matrix.outfile }}

      - name: Run tests
        run: ./packages/lde/${{ matrix.outfile }} test
