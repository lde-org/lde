name: Test

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            outfile: lde-dev
          - os: ubuntu-22.04-arm
            outfile: lde-dev
          - os: windows-latest
            outfile: lde-dev.exe
          - os: windows-11-arm
            outfile: lde-dev.exe
          - os: macos-15-intel
            outfile: lde-dev
          - os: macos-15
            outfile: lde-dev

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup lde
        uses: lde-org/setup-lde@master
        with:
          version: nightly

      - name: Build lde
        # lde's own tests invoke the lde binary directly (e.g. to test CLI flags),
        # so we must compile a fresh binary from source before running tests.
        # Using the pre-installed nightly binary would miss any CLI changes in this PR.
        run: |
          cd packages/lde
          lde compile --outfile ${{ matrix.outfile }}

      - name: Run tests
        run: ./packages/lde/${{ matrix.outfile }} test
