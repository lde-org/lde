name: Test

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
          - os: windows-latest
          - os: windows-11-arm
          - os: macos-15-intel
          - os: macos-15
          - os: ubuntu-22.04-arm
            android: true

    runs-on: ${{ matrix.os }}

    env:
      OUTFILE: ${{ contains(matrix.os, 'windows') && 'lde-dev.exe' || 'lde-dev' }}

    steps:
      - uses: actions/checkout@v6

      - name: Cache llvm-mingw (Windows x86-64)
        if: matrix.os == 'windows-latest'
        id: cache-llvm-mingw-x64
        uses: actions/cache@v5
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Setup llvm-mingw (Windows x86-64)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ("${{ steps.cache-llvm-mingw-x64.outputs.cache-hit }}" -ne "true") {
            curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
            Expand-Archive -Path llvm-mingw.zip -DestinationPath .
          }
          echo "$env:GITHUB_WORKSPACE\llvm-mingw-20260311-ucrt-x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set SEA_CC (Windows x86-64)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: echo "SEA_CC=x86_64-w64-mingw32-clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache llvm-mingw (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        id: cache-llvm-mingw-arm64
        uses: actions/cache@v5
        with:
          path: llvm-mingw-20260311-ucrt-aarch64
          key: llvm-mingw-20260311-ucrt-aarch64

      - name: Setup llvm-mingw (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          if ("${{ steps.cache-llvm-mingw-arm64.outputs.cache-hit }}" -ne "true") {
            curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-aarch64.zip
            Expand-Archive -Path llvm-mingw.zip -DestinationPath .
          }
          echo "$env:GITHUB_WORKSPACE\llvm-mingw-20260311-ucrt-aarch64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set SEA_CC (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: echo "SEA_CC=aarch64-w64-mingw32-clang" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache Android NDK
        if: matrix.android
        id: cache-android-ndk
        uses: actions/cache@v5
        with:
          path: android-ndk-r29
          key: android-ndk-r29-aarch64

      - name: Setup Android NDK
        if: matrix.android
        run: |
          if [[ "${{ steps.cache-android-ndk.outputs.cache-hit }}" != "true" ]]; then
            wget -q https://github.com/lzhiyong/termux-ndk/releases/download/android-ndk/android-ndk-r29-aarch64.7z
            7z x android-ndk-r29-aarch64.7z -o. > /dev/null
          fi
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r29" >> $GITHUB_ENV

      - name: Set SEA_CC (Android)
        if: matrix.android
        run: echo "SEA_CC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-aarch64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV

      - name: Install macOS build deps
        if: startsWith(matrix.os, 'macos')
        run: brew install autoconf automake libtool

      - uses: lde-org/setup-lde@master
        if: "!matrix.android"
        with:
          version: nightly

      - name: Setup lde (Android)
        if: matrix.android
        uses: lde-org/setup-lde@master
        with:
          version: nightly
          platform: Android
          arch: aarch64

      - name: Cache curl-sys build
        uses: actions/cache@v5
        with:
          path: packages/*/target/curl-sys
          key: curl-sys-${{ matrix.os }}-${{ runner.arch }}${{ matrix.android && '-android' || '' }}

      - name: Cache deflate-sys build
        uses: actions/cache@v5
        with:
          path: packages/*/target/deflate-sys
          key: deflate-sys-${{ matrix.os }}-${{ runner.arch }}${{ matrix.android && '-android' || '' }}

      - name: Cache git2-sys build
        uses: actions/cache@v5
        with:
          path: packages/*/target/git2-sys
          key: git2-sys-${{ matrix.os }}-${{ runner.arch }}${{ matrix.android && '-android' || '' }}

      - name: Build lde
        # lde's own tests invoke the lde binary directly (e.g. to test CLI flags),
        # so we must compile a fresh binary from source before running tests.
        # Using the pre-installed nightly binary would miss any CLI changes in this PR.
        if: "!matrix.android"
        run: |
          cd packages/lde
          lde compile --outfile ${{ env.OUTFILE }}

      - name: Run tests
        if: "!matrix.android"
        run: ./packages/lde/${{ env.OUTFILE }} test

      - name: Fix workspace permissions (Android)
        if: matrix.android
        run: chmod -R a+rw ${{ github.workspace }}

      - name: Cache Android test image
        if: matrix.android
        id: cache-android-image
        uses: actions/cache@v5
        with:
          path: /tmp/termux-android.tar
          key: termux-android-v2

      - name: Setup Android test image
        if: matrix.android
        run: |
          if [[ "${{ steps.cache-android-image.outputs.cache-hit }}" == "true" ]]; then
            docker load -i /tmp/termux-android.tar
          else
            docker rm -f termux-build 2>/dev/null || true
            docker run --privileged --platform linux/arm64 --name termux-build \
              -e DEBIAN_FRONTEND=noninteractive \
              termux/termux-docker:aarch64 \
              bash -c "apt update && apt upgrade -y -o Dpkg::Options::=--force-confdef -o Dpkg::Options::=--force-confold && apt install -y git clang curl zip make cmake autoconf automake libtool openssl perl"
            docker commit termux-build termux-android:latest
            docker rm termux-build
            docker save termux-android:latest -o /tmp/termux-android.tar
          fi

      - name: Run tests (Android)
        if: matrix.android
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -v $HOME/.lde/lde:/workspace/lde \
            -w /workspace \
            -e ANDROID_NDK_ROOT=/workspace/android-ndk-r29 \
            -e LD_LIBRARY_PATH=/data/data/com.termux/files/usr/lib \
            -e TMPDIR=/data/data/com.termux/files/usr/tmp \
            termux-android:latest \
            bash -c "/workspace/lde --setup && cd /workspace/packages/lde && /workspace/lde compile --outfile /workspace/packages/lde/${{ env.OUTFILE }} && cd /workspace && /workspace/packages/lde/${{ env.OUTFILE }} test"
