name: Test

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
          - os: windows-latest
          - os: windows-11-arm
          # - os: macos-15-intel
          - os: macos-15

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup lpm
        uses: codebycruz/lpm@master
        with:
          version: nightly

      - name: Run tests
        run: lpm test
